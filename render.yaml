services:
  - type: web
    name: orin-ai-engine
    env: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn orin_ai_engine.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ORIN_AI_STORAGE_DIR
        value: /opt/render/project/src/storage
      - key: ORIN_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: ORIN_CHROMA_COLLECTION
        value: orin_academic_chunks
